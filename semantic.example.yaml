# sql-steward semantic layer.
#
# This file is the entire contract between an AI agent and your database. The
# agent can read what is described here and nothing else. Review it like code.

dialect: postgres            # postgres | tsql | sqlite | mysql | snowflake | bigquery

entities:
  customers:
    table: customers
    primary_key: id
    description: People who pay for the product.
    fields:
      id: {type: int}
      name: {type: text, pii: PERSON}
      email: {type: text, pii: EMAIL_ADDRESS}
      country: {type: text}
      created_at: {type: timestamp}

  subscriptions:
    table: subscriptions
    primary_key: id
    description: Active and past subscriptions.
    fields:
      id: {type: int}
      customer_id: {type: int}
      plan: {type: text}
      mrr: {type: numeric, description: Monthly recurring revenue in USD.}
      status: {type: text}

  documents:
    table: documents
    primary_key: id
    description: Knowledge-base documents, semantically searchable (pgvector).
    fields:
      id: {type: int}
      title: {type: text}
      body: {type: text}
      embedding: {type: vector}          # pgvector column
    # Enables semantic_search() over this entity. PostgreSQL + pgvector only.
    search:
      vector_column: embedding
      dim: 768
      returns: [id, title]               # the embedding itself is never returned

# Only joins listed here are reachable. Ask for a relationship that is not here
# and sql-steward refuses rather than inventing one.
joins:
  - left: subscriptions
    right: customers
    on: subscriptions.customer_id = customers.id

# Pre-approved aggregates. The agent chooses dimensions and filters from the
# allow-lists; it cannot change the aggregation itself.
metrics:
  mrr_total:
    entity: subscriptions
    aggregate: sum
    field: mrr
    description: Total monthly recurring revenue.
    dimensions_allowed: [plan, status, customers.country]
    filters_allowed: [status, plan, customers.country]

  customer_count:
    entity: customers
    aggregate: count
    field: "*"
    description: Number of customers.
    dimensions_allowed: [country]
    filters_allowed: [country]

# Declared data-quality checks. Each compiles to a read-only count of violations;
# run_checks runs them all and returns a readiness score. kinds: not_null,
# unique, range, accepted_values, row_count_min. severity is error (default) or
# warn -- a failing error makes the status "failing", a failing warn "degraded".
checks:
  email_present:
    entity: customers
    kind: not_null
    field: email
  country_known:
    entity: customers
    kind: accepted_values
    field: country
    values: [UK, US, NL]
  mrr_non_negative:
    entity: subscriptions
    kind: range
    field: mrr
    min: 0
  has_customers:
    entity: customers
    kind: row_count_min
    min: 1
    severity: warn

# What the layer refuses, before any query runs.
policy:
  block_pii: [EMAIL_ADDRESS, CREDIT_CARD]
  max_rows: 1000
